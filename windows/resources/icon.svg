<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)"/>
  
  <!-- Connection lines -->
  <path d="M 140 200 Q 256 150 372 200" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 140 256 Q 256 206 372 256" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 140 312 Q 256 262 372 312" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Phone icon (left) -->
  <rect x="100" y="180" width="60" height="100" rx="8" fill="white"/>
  <rect x="110" y="195" width="40" height="60" fill="url(#gradient)" opacity="0.3"/>
  <circle cx="130" cy="265" r="5" fill="url(#gradient)"/>
  
  <!-- PC icon (right) -->
  <rect x="332" y="180" width="80" height="60" rx="4" fill="white"/>
  <rect x="345" y="195" width="54" height="30" fill="url(#gradient)" opacity="0.3"/>
  <rect x="357" y="240" width="30" height="8" fill="white"/>
  <rect x="347" y="248" width="50" height="12" rx="2" fill="white"/>
  
  <!-- Sync arrows -->
  <path d="M 200 230 L 220 220 L 220 240 Z" fill="white"/>
  <path d="M 312 250 L 292 260 L 292 240 Z" fill="white"/>
</svg>
